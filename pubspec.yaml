name: dibburim_app
description: "Dibburim - A serene meditation and prayer timer app for daily Hitbodedut."
publish_to: 'none'
version: 1.1.1+4

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Supabase (placeholder for future backend)
  supabase_flutter: ^2.14.2

  # Audio Playback
  audioplayers: ^6.1.0

  # Local Storage
  shared_preferences: ^2.3.4

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Timezone support for scheduled notifications
  timezone: ^0.10.0

  # Google Fonts (Heebo for Hebrew — loaded from CDN, no local files needed)
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.20.2

  # Hebrew Calendar & Jewish Law
  kosher_dart: ^2.0.18
  google_sign_in: ^6.2.1
  flutter_timezone: ^5.1.0
  flutter_native_splash: ^2.4.8
  in_app_update: ^4.2.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#22324e"
  adaptive_icon_foreground: "assets/images/icon_adaptive_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - .env

flutter_native_splash:
  color: "#FDF8F0"
  image: "assets/images/splash_icon.png"
  android_12:
    color: "#FDF8F0"
    image: "assets/images/splash_icon.png"

